<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silk Road – Loading</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { background: #0d0602; }

#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #0d0602;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  transition: opacity .7s ease;
}
#splash.out { opacity: 0; pointer-events: none; }

/* Ambient warm glow behind character */
#splash::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(90, 50, 12, 0.22);
  pointer-events: none;
}

.splash-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 15px; letter-spacing: .38em;
  text-transform: uppercase; color: #d4a843;
  opacity: 0;
  animation: fi .6s ease .15s forwards;
}

#rblx {
  width: 190px; height: 287px;
  overflow: visible;
  filter: drop-shadow(0 8px 30px rgba(212,168,67,.25))
          drop-shadow(0 0 60px rgba(212,168,67,.08));
}

/* ── Base state for every animated shape ── */
.dp {
  fill-opacity: 0;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
}

/* ── Keyframes ── */
@keyframes drw { to { stroke-dashoffset: 0 } }
@keyframes col { to { fill-opacity: 1 } }
@keyframes fi  { to { opacity: 1 } }

/*
  Draw timeline (each part draws sequentially with a gold pen):
  Head   : 0.20s  dur 0.55s → done 0.75s
  Hair   : 0.75s  dur 0.30s → done 1.05s
  Eye-L  : 1.05s  dur 0.17s → done 1.22s
  Eye-R  : 1.22s  dur 0.17s → done 1.39s
  Smile  : 1.39s  dur 0.38s → done 1.77s
  Neck   : 1.77s  dur 0.18s → done 1.95s
  Torso  : 1.95s  dur 0.62s → done 2.57s
  Arm-L  : 2.57s  dur 0.42s → done 2.99s
  Arm-R  : 2.99s  dur 0.42s → done 3.41s
  Leg-L  : 3.41s  dur 0.28s → done 3.69s
  Leg-R  : 3.69s  dur 0.28s → done 3.97s
  Fills  : 4.00s  dur 0.45s
  Lines  : 4.45s  dur 0.50s
*/

.ph  { stroke:#d4a843; stroke-width:2.0; fill:#c09060;
       animation: drw .55s ease .20s forwards, col .45s ease 4.00s forwards; }
.pr  { stroke:#d4a843; stroke-width:1.6; fill:#3b1c07;
       animation: drw .30s ease .75s forwards, col .45s ease 4.00s forwards; }
.pel { stroke:#d4a843; stroke-width:1.2; fill:#0c0401;
       animation: drw .17s ease 1.05s forwards, col .45s ease 4.00s forwards; }
.per { stroke:#d4a843; stroke-width:1.2; fill:#0c0401;
       animation: drw .17s ease 1.22s forwards, col .45s ease 4.00s forwards; }
.psm { fill:none; stroke:#0c0401; stroke-width:3; stroke-linecap:round;
       animation: drw .38s ease 1.39s forwards; }
.pnk { stroke:#d4a843; stroke-width:1.6; fill:#c09060;
       animation: drw .18s ease 1.77s forwards, col .45s ease 4.00s forwards; }
.pto { stroke:#d4a843; stroke-width:2.2; fill:#566130;
       animation: drw .62s ease 1.95s forwards, col .45s ease 4.00s forwards; }
.pal { stroke:#d4a843; stroke-width:1.8; fill:#4e5a2a;
       animation: drw .42s ease 2.57s forwards, col .45s ease 4.00s forwards; }
.par { stroke:#d4a843; stroke-width:1.8; fill:#4e5a2a;
       animation: drw .42s ease 2.99s forwards, col .45s ease 4.00s forwards; }
.pll { stroke:#d4a843; stroke-width:1.8; fill:#1c2a0d;
       animation: drw .28s ease 3.41s forwards, col .45s ease 4.00s forwards; }
.plr { stroke:#d4a843; stroke-width:1.8; fill:#1c2a0d;
       animation: drw .28s ease 3.69s forwards, col .45s ease 4.00s forwards; }

/* Jacket seam lines — dark, drawn after fill appears */
.jl {
  fill: none; stroke: rgba(0,0,0,.32); stroke-width: 1;
  stroke-dasharray: 100; stroke-dashoffset: 100;
  animation: drw .45s ease 4.45s forwards;
}

/* ── Progress bar ── */
.bar-track {
  width: 150px; height: 2px;
  background: rgba(212,168,67,.13);
  border-radius: 2px; overflow: hidden;
}
.bar-fill {
  height: 100%; width: 0;
  background: #d4a843;
  border-radius: 2px;
  animation: bf 4.8s cubic-bezier(.15,.85,.2,1) .2s forwards;
}
@keyframes bf { to { width: 100% } }

.bar-label {
  font-family: Georgia, serif;
  font-size: 11px; letter-spacing: .26em;
  text-transform: uppercase;
  color: rgba(212,168,67,.5);
  opacity: 0;
  animation: fi .5s ease .5s forwards;
}
.bar-label::after { content: ''; animation: el 1.5s steps(4,end) 1s infinite; }
@keyframes el {
  0%  { content: ''; }   25% { content: '.'; }
  50% { content: '..'; } 75% { content: '...'; }
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-title">Silk Road Calculator</div>

  <svg id="rblx" viewBox="0 0 160 242" xmlns="http://www.w3.org/2000/svg">
    <!-- ── LEGS (back layer) ── -->
    <rect class="dp pll" x="36" y="190" width="36" height="52" rx="2" pathLength="100"/>
    <rect class="dp plr" x="88" y="190" width="36" height="52" rx="2" pathLength="100"/>

    <!-- ── TORSO ── -->
    <rect class="dp pto" x="25" y="102" width="110" height="90" rx="4" pathLength="100"/>

    <!-- Jacket seam lines (drawn after torso fills) -->
    <line class="jl" x1="25" y1="127" x2="135" y2="127" pathLength="100"/>
    <line class="jl" x1="25" y1="151" x2="135" y2="151" pathLength="100"/>
    <line class="jl" x1="25" y1="175" x2="135" y2="175" pathLength="100"/>
    <line class="jl" x1="80"  y1="102" x2="80"  y2="192" pathLength="100"/>

    <!-- ── ARMS ── -->
    <rect class="dp pal" x="1"   y="102" width="26" height="90" rx="4" pathLength="100"/>
    <rect class="dp par" x="133" y="102" width="26" height="90" rx="4" pathLength="100"/>

    <!-- ── NECK ── -->
    <rect class="dp pnk" x="63" y="88" width="34" height="17" rx="2" pathLength="100"/>

    <!-- ── HEAD ── -->
    <rect class="dp ph" x="35" y="5" width="90" height="86" rx="5" pathLength="100"/>

    <!-- ── HAIR (rounded top corners, flat bottom edge = hairline) ── -->
    <path class="dp pr"
          d="M 35,39 L 35,12 Q 35,5 42,5 L 118,5 Q 125,5 125,12 L 125,39 Z"
          pathLength="100"/>

    <!-- ── EYES ── -->
    <rect class="dp pel" x="52" y="44" width="13" height="15" rx="2" pathLength="100"/>
    <rect class="dp per" x="95" y="44" width="13" height="15" rx="2" pathLength="100"/>

    <!-- ── SMILE (arc curving down = classic Roblox grin) ── -->
    <path class="dp psm" d="M 52,66 Q 80,84 108,66" pathLength="100"/>

  </svg>

  <div class="bar-label">Loading</div>
  <div class="bar-track"><div class="bar-fill"></div></div>
</div>

<script>
window.hideSplash = function(){
  var s = document.getElementById('splash');
  s.classList.add('out');
  setTimeout(function(){ s.style.display = 'none'; }, 750);
};

// Auto-dismiss after full animation — comment out if you want manual control
setTimeout(window.hideSplash, 5400);
</script>

</body>
</html>
